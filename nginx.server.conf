location / {
  rewrite ^/$ /index.php?app=home&apph=home;
  rewrite "^/cpanel(?:\/([a-zA-Z0-9_-]{0,50})){0,1}$" /cpanel.php?page=$1;
  if (!-e $request_filename){
    rewrite ^/([^\/]+)(\/|)$ /index.php?app=profile&apph=profile&uname=$1;
  }
  if (!-e $request_filename){
    rewrite ^/(.*)/(account|general|delete|password|password_reset|credits|profile|notifications|privacy|verification|store|administration|social_account|business_account|manage_sessions|blocked)(?:\/?|)$ /index.php?app=profile&apph=profile&uname=$1&page=$2;
  }
  if (!-e $request_filename){
    rewrite "^/settings(?:\/(\w+)\/(\w+)){0,1}(?:\/?|)$" /index.php?app=settings&apph=settings&page=$1&user=$2;
  }
}

location /timeline {
  rewrite ^/timeline(?:\/?|)$ /index.php?app=timeline&apph=timeline;
}

location /messages {
  rewrite ^/messages(?:\/?|)$ /index.php?app=messages&apph=messages;
  rewrite ^/messages/([^\/]+)(?:\/?|)$ /index.php?app=messages&apph=messages&uname=$1;
}

