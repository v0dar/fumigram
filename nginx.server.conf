location /load {
  rewrite ^/load/(.*)/(.*)$ /load.php?app=$1&apph=$2;
  rewrite ^/load/(.*)/(.*)/(.*)$ /load.php?app=$1&apph=$2&uname=$3;
  rewrite ^/load/explore/(.*)$ /load.php?app=explore&apph=tags&tag=$1
  rewrite ^/load/messages/(.*)$ /load.php?app=messages&apph=messages&uname=$1;
  rewrite ^/load/tile/(view_tile)/(.*)$ /load.php?app=tile&apph=view_tile&pid=$2;
  rewrite ^/load/posts/(view_post)/(.*)$ /load.php?app=posts&apph=view_post&pid=$2;
  rewrite ^/load/(.*)/(following|followers|posts|favourites|subscriptions|tiles)(?:\/?|)$ /load.php?app=profile&apph=profile&uname=$1&page=$2;
  rewrite ^/load/(.*)/(account|general|delete|password|password_reset|credits|profile|notifications|privacy|verification|store|administration|social_account|business_account|manage_sessions|blocked)(?:\/?|)$ /load.php?app=settings&apph=settings&user=$1&page=$2;
}