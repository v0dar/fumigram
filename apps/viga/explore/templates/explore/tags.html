	<script>
		tippy('.promo', {arrow: true,content: '{{LANG promoted_post}}'});
		jQuery(document).ready(function($) {
			var scrolled = 0;
			var last_id  = 0;
			$(window).scroll(function() {
			    if($(window).scrollTop() + $(window).height() > $(document).height() - 100) {
			    	if (scrolled == 0) {
		                scrolled = 1;
		                var list_ids = $("div.explore-postset[id]").map(function() {
			                return $(this).attr('id');
			            }).get();

			            if (!list_ids) {return false;}
        				var last_id = Math.min.apply(Math,list_ids);
						$.ajax({
							url: link('posts/explore-tags'),
							type: 'GET',
							dataType: 'json',
							data: {offset:last_id},
						}).done(function(data) {
							if (data.status == 200) {
								$(".pg_grid_posts_tag").gridalicious('append', $(data.html));
								scrolled = 0;
							}
							else{
								$(window).unbind('scroll');
							}
						});
		       		}
			    }
			});
		});
	</script>
