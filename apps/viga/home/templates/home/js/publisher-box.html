<script>
$(function(){
    $(".create-new-post, .hub").click(function(event) {
        var post_type = $(this).attr('data-type');
    	if (post_type) {
    		$.ajax({url: link('posts/new-' + post_type),type: 'GET',dataType: 'json'})
            .done(function(data) {
    			if (data.status == 200) {
    				$('body').addClass('active');
    				$("#create-newpost").html(data.html).fadeIn(300);
    			}else{
                    if (data.message) {
						Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
					}
                }
    		});
    	}
    });
	$(document).on('click','#close-anim-modal',function(event) {
        $("#create-newpost").fadeOut(200,function(){
            $(this).empty();
            $("body").removeClass('active');
        });
    });
    $(document).on('click','#close-anim-image-modal',function(event) {
		$("#create-newpost").fadeOut(200,function(){
			$(this).empty();
			$("body").removeClass('active');
		});      
	});
	$(document).keyup(function(e) {
		if (e.keyCode == 27) {
			$("#create-newpost").fadeOut(200,function(){
			$(this).empty();
			$("body").removeClass('active');
		});
		}
	});
 });
</script>
