			let xhr = new XMLHttpRequest();
			xhr.open("GET", "https://jsonplaceholder.typicode.com/posts", true);
			xhr.onload = () =>{
			if(xhr.status == 200 && xhr.status < 300){
				online();
			} else { offline(); }

			xhr.send();
