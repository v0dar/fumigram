	function follow(user_id,object){
		if (!user_id || !object) { return false; }
		if (not(is_logged())) {
			redirect('home');
			return false;
		}
		object = $(object);
		var profile_type = object.attr('data-profile-type');
		if (profile_type == 0 || profile_type == 1) {
			if(object.hasClass('btn-requested') == true){
				object.find('span').text("{{LANG follow}}");
				if (object.hasClass('btn-requested')) {
					object.removeClass('btn-requested');
				}
			} else if(object.hasClass('btn-following') == true){
				object.find('span').text("{{LANG follow}}");
				if (object.hasClass('btn-following')) {
					object.removeClass('btn-following');
				}
			} else if (object.hasClass('btn-following') == false && object.hasClass('btn-requested') == false) {
				object.find('span').text("{{LANG requested}}");
				if (!object.hasClass('btn-requested')) {
					object.addClass('btn-requested');
				}
			}
		} else {
			if (object.hasClass('btn-following') == false) {
				object.find('span').text("{{LANG following}}");
				if (!object.hasClass('btn-following')) {
					object.addClass('btn-following');
				}
			} else if(object.hasClass('btn-following') == true){
				object.find('span').text("{{LANG follow}}");
				if (object.hasClass('btn-following')) {
					object.removeClass('btn-following');
				}
			} else {return false;}
		}
		$.ajax({url: link('main/follow'),type: 'GET',dataType: 'json',data: {user_id:user_id}}).done(function(data) {
			Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message2+'</div>'});
		});
	}

	});

	/****************************
	 * @param Report Functions
	 ****************************/
	function ID() {
		var reports = document.getElementsByName('report');
		for (index=0; index < reports.length; index++) {
			if (reports[index].checked) {
				return reports[index].getAttribute('data-id');
				break;
			}
		}
	}
	function Type() {
		var reports = document.getElementsByName('report');
		for (index=0; index < reports.length; index++) {
			if (reports[index].checked) {
				return reports[index].value;
				break;
			}
		}
	}
	function Msg() {
		var reports = document.getElementsByName('message');
		for (index=0; index < reports.length; index++) {
			return reports[index].value;
			break;
		}
	}

	/****************************
	 * @param Post Slider
	 ****************************/
	slide_init();
	var px_dura = (1000 * 15);
	$('.cr-controls').click(function(event) {var sdir = $(this).data('slide');});
	var scr = $("#post-data-cr").carousel({wrap: false,interval: false});
	scr.on('slid.bs.carousel', function(event) {
		var active = px_cont.find('.post-slide-progress').find('li.active');
		if (active.prevAll('li').length > 0) {
			$('.carousel-control-prev').fadeIn(10);
		}else {
			$('.carousel-control-prev').fadeOut(10);
		}
		if (active.nextAll('li').length > 0) {
			$('.carousel-control-next').fadeIn(10);;
		}else {
			$('.carousel-control-next').fadeOut(10);
		}
	});
	function slide_left() {
		px_cont.find('.post-slide-progress').find('li.active').find('span').stop();
		var actv = px_cont.find('.post-slide-progress').find('li.active');
		var prev = actv.prev('li');
		if (prev.length > 0) {		
			prev.nextAll('li').removeClass('active').find('span').stop(true, true).css('width', '0px');
			delay(function(){
				prev.addClass('active').find('span').css('width', '0').stop(true, true).animate({width: '100%'},{
					duration:px_dura,
					complete:function(){
						slide_right();
					}
				});
			},50);	
			$("#post-data-cr").carousel("prev");
		}
	}
	function slide_right() {
		px_cont.find('.post-slide-progress').find('span').stop(true, true);
		var actv = px_cont.find('.post-slide-progress').find('li.active');
		var next = actv.next('li');
		var curr = next.index();
		var last = px_cont.find('.post-slide-progress').find('li:last').index();
		if (next.length > 0) {
			next.prevAll('li').removeClass('active').find('span').stop(true, true).css('width', '100% !important');
			delay(function(){
				next.addClass('active').find('span').stop(true, true).animate({width: '100%'},{
					duration:px_dura,
					complete:function(){
						if (curr == last) {
							slide_finish();
						}else{slide_right();}
					}
				});
			},50);
			$("#post-data-cr").carousel("next");
		}
	}
	function slide_init(){
		var active = px_cont.find('.post-slide-progress').find('li.active');
		if (active.prevAll('li').length > 0) {
			active.prevAll('li').each(function(index, el) {
				$(el).find('.post-progress-bar').width('100%');
			});
		}
		active.find('span').width(0).animate({width: '100%'},{
			duration:px_dura,
			complete:function(){
				var curr = $(this).parent('li').index();
				var last = px_cont.find('.post-slide-progress').find('li:last').index();
				if (curr == last) {
					slide_finish();
				}else{
					delay(function(){
						slide_right();
					},50);
				}	
			},
		});
		if (active.prevAll('li').length > 0) {
			$('.carousel-control-prev').fadeIn(10);
		}else {
			$('.carousel-control-prev').fadeOut(10);
		}
		if (active.nextAll('li').length > 0) {
			$('.carousel-control-next').fadeIn(10);
		}else {
			$('.carousel-control-next').fadeOut(10);
		}
	}
	function slide_finish(){
		px_cont.find('.post-slide-progress').find('span').each(function(index, el) {
			$(el).stop();
		});
	}

	/****************************
	 * @param Share Modal
	 ****************************/
	function ShareModal(post_id, element) {
		if (!post_id || post_id == 0) {return false;}
		$("#modal-progress").removeClass('hidden');
		$.get(link('main/share-modal'), {post_id: post_id}, function (data) {
			if (data.status == 200) {
				$('body').addClass('active');
				$("#create-newpost").html(data.html).fadeIn(80);
			}else{
				if (data.message) {
					Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
				}
			}
			$("#modal-progress").addClass('hidden');
		});
	}
	
	/****************************
	 * @param Share to Timeline
	 ****************************/
	function ShareToTimeLine(post_id, element) {
		if (!post_id || post_id == 0) {return false;}
		var caption = $('#comment').val();
  		$(element).html('<span>{{LANG hold_on}}</span>');
  		$(element).attr('disabled', 'true');
		$.ajax({url: link('main/share-post'),type: 'GET',dataType: 'json',data: {post_id:post_id,caption:caption}})
		.done(function(data) {
			if (data.status == 200) {
				setTimeout(function () {
					$(this).empty();
					Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
					$("body").removeClass('active');
					$("#create-newpost").fadeOut(100);
					$('#create-newpost').hide();
				},1500);
			}else{
				Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
				setTimeout(function () {
					$(this).empty();
					$("body").removeClass('active');
					$("#create-newpost").fadeOut(100);
					$('#create-newpost').hide();
				},1500);
			}
		});
	}

	$('body').on('mouseenter', '.udata', function() {
		var popover = $(this);
		var user_id   = popover.attr('data-id');
		var placement = 'user-details';
		var utimeout  = setTimeout(function() {
		var offset = popover.offset();
		var posY = (offset.top - $(window).scrollTop()) + popover.height();
		var posX = offset.left - $(window).scrollLeft();
		var available = $(window).width() - posX;
			if ($(window).width() > 500) {
				if (available < 400) {
					var right = available - popover.width();
					if (posY > 0) {
						$('body').append('<div class="' + placement + ' right" style="position: fixed; top: ' + posY + 'px; right:' + right + 'px"><div class="fetching-data"><div class="skel skel_cover"></div><div class="valign udata-popover"><div class="user-avatar"><div class="skel skel_50"></div></div><div class="max-width"><div class="skel skel_2 skel_noti_name"></div><div class="skel skel_2 skel_noti_time"></div><div class="skel skel_2 skel_noti_time"></div></div></div></div></div>');
					}
				} else {
					if (posY > 0) {
						$('body').append('<div class="' + placement + '" style="position: fixed; top: ' + posY + 'px; left:' + posX + 'px"><div class="fetching-data"><div class="skel skel_cover"></div><div class="valign udata-popover"><div class="user-avatar"><div class="skel skel_50"></div></div><div class="max-width"><div class="skel skel_2 skel_noti_name"></div><div class="skel skel_2 skel_noti_time"></div><div class="skel skel_2 skel_noti_time"></div></div></div></div></div>');
					}
				}
			}
			$.get(link('profile/popover'), {user_id:user_id}, function (data) {
				if (data.status == 200) {
					setTimeout(function() {
					    $('.user-details').html(data.html);
				    }, 200);
				}
			});
		}, 200);
		popover.data('timeout', utimeout);
	});
