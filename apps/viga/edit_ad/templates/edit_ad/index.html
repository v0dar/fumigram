<script type="text/javascript">
	jQuery(document).ready(function($) {
		$("form#edit_ad").ajaxForm({
			url: link('profile/edit_ad'),
			type: 'POST',
			dataType: 'json',
			beforeSubmit: function(arr,form){
				$(form).find('.pp_load_loader').addClass('loadingg');
				$(form).find('button[type="submit"]').attr('disabled','true');
				Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG processing_ad_changes}}</div>'});
			},
			success: function(data,stat,xhr,form){
				setTimeout(function () {
				Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
				if (data.status == 200) {
					setTimeout(function () {
						window.location.href = "{{CONFIG site_url}}/campaign";
					},4000);
				}
				$(form).find('.pp_load_loader').removeClass('loadingg');
				$(form).find('button[type="submit"]').removeAttr('disabled');
            },5000);
			}
		});
	});
	$('.selectpicker').selectpicker({});
