<script type="text/javascript">
function price() {
    var plans = document.getElementsByName('plans');
    for (index=0; index < plans.length; index++) {
        if (plans[index].checked) {
            return plans[index].getAttribute('data-price');
            break;
        }
    }
}
// Credit Description
function value() {
    var plans = document.getElementsByName('plans');
    for (index=0; index < plans.length; index++) {
        if (plans[index].checked) {
            return plans[index].value;
            break;
        }
    }
}

// Paypal Method
function Pxp_PayPalLink(type) {
	$('.paypal').attr('disabled','true');
	Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG processing_payment}}</div>'});
	$.post(link('payment/paypal'), {value:value(), price:price(), mode: "add_credits"}, function(data, textStatus, xhr) {
		if (data.status == 200) {
			window.location.href = data.url;
		} else {
			Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
		}
	$('.paypal').removeAttr('disabled');
	});
}
</script>
