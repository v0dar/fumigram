<script>
	document.getElementById('t-chest').addEventListener('click', function(e) {
		$('.tokens-exp').fadeIn(400).removeClass('hidden');
		$('.t-tokens').fadeIn(100).removeClass('hidden');
		$('#creditPay').html('<span>{{LANG pay}} ' + Price() + ' {{LANG credits}}</span>');
	});
	document.getElementById('r-pot').addEventListener('click', function(e) {
		$('.tokens-exp').fadeOut(400).addClass('hidden');
		$('.t-tokens').fadeIn(100).removeClass('hidden');
		$('#creditPay').html('<span>{{LANG pay}} ' + Price() + ' {{LANG credits}}</span>');
	});
	document.getElementById('r-rain').addEventListener('click', function(e) {
		$('.tokens-exp').fadeOut(400).addClass('hidden');
		$('.t-tokens').fadeIn(100).removeClass('hidden');
		$('#creditPay').html('<span>{{LANG pay}} ' + Price() + ' {{LANG credits}}</span>');
	});

	function ProcessPayment(){
		$('#creditPay').attr('disabled','true');
		$.post(link('payment/pay'), {description:description(), price:Price(), mode: "credits"}, function(data, textStatus, xhr) {
			Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG c_payment}}</div>'});
			if (data.status == 200) {
				setTimeout(function () {
					Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
					$('#creditPay').removeAttr('disabled');
					$('#ajax_redirect').attr('href', "{{CONFIG site_url}}/tokens");
					$('#ajax_redirect').attr('data-ajax', "load.php?app=tokens&apph=tokens");
					$('#ajax_redirect').click();
				}, 5000);			
			} else {
				setTimeout(function () {
					Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
					$('#creditPay').removeAttr('disabled');
					$('#ajax_redirect').attr('href', "{{CONFIG site_url}}/tokens");
					$('#ajax_redirect').attr('data-ajax', "load.php?app=tokens&apph=tokens");
					$('#ajax_redirect').click();
				}, 5000);
			}
		});
	}

	function Exchange(){
		$('.exchange').attr('disabled','true');
		Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG exchanging_tokens}}</div>'});
		setTimeout(function(){
			$.post(link('payment/exchange'), {}, function(data, textStatus, xhr) {
			if (data.status == 200) {
				$('.exchange').removeAttr('disabled');
				Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
				$('#ajax_redirect').attr('href', "{{CONFIG site_url}}/tokens");
				$('#ajax_redirect').attr('data-ajax', "load.php?app=tokens&apph=tokens");
				$('#ajax_redirect').click();
			} else {
				$('.exchange').removeAttr('disabled');
				Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">'+data.message+'</div>'});
				$('#ajax_redirect').attr('href', "{{CONFIG site_url}}/tokens");
				$('#ajax_redirect').attr('data-ajax', "load.php?app=tokens&apph=tokens");
				$('#ajax_redirect').click();
			}	
		});
		},1000);
	}
</script>
