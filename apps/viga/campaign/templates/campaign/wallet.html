<script type="text/javascript">
	function Pxp_PaymentMethods(type) {

			$.post(link('main/payment-methods'), {type: type}, function(data, textStatus, xhr) {

			});

	//Paypal Link
	function Pxp_PayPalPayment() {

					window.location.href = data.url;
				}
				$('.btn-paypal').removeAttr('disabled');
			});

			Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG please_check_details}}</div>'});

	//PayViaPaystac
	function PayViaPaystack(){

	//PayVia Razorpay
	function PayViaRazorpay() {
		$('.razorpay-payment').attr('disabled','true');
		var type = "add_money";
		var amount = $('#wallet').val();
		$.post(link('razorpay/generate_order'), {amount:amount}, function(data, textStatus, xhr) {
			if (data.status == 200) {
				if(data.id !== ''){
					var options = {
						"key": "<?php echo $config['razorpay_key'];?>", // Enter the Key ID generated from the Dashboard
						"amount": amount * 100,
						"currency": "INR",
						"name": "<?php echo $config['site_name'];?>",
						"description": "Top Up Wallet",
						"image": "{{CONFIG site_url}}/media/img/logo.{{CONFIG logo_extension}}",
						"order_id": data.id, //This is a sample Order ID. Pass the `id` obtained in the response of Step 1
						"handler": function (response){
							$.post(link('razorpay/proccess_payment'), {payment_id:response.razorpay_payment_id,order_id:response.razorpay_order_id,signature:response.razorpay_signature,type:type,amount:amount}, function (data) {
								if (data.status == 200) {
									window.location.href = data.url;
								} else {
									Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG payment_declined}}</div>'});
								}
							});
						},
						"theme": {"color": "#F37254"}
					};
					var rzp1 = new Razorpay(options);
					rzp1.open();
				}
			}
			$('.razorpay-payment').removeAttr('disabled');
		});
	}

	// Pay Via Paysera
	function PayViaPaysera(){
		var amount = $('#wallet').val();
		$('.paysera-payment').attr('disabled','true');
		$.post(link('payment/paysera'), {amount: amount}, function(data, textStatus, xhr) {
			if (data.status == 200) {
				window.location.href = data.url;
			}
			$('.paysera-payment').removeAttr('disabled');
		});
	}

	//Stripe Payment
	function Pxp_StripePayment() {
		var amount = $('#wallet').val();
		var stripe = Stripe("<?php echo $config['stripe_id'];?>");
		$.post(link('payment/stripe_session'), {amount: amount}, function(data, textStatus, xhr) {
			if (data.status == 200) {
				return stripe.redirectToCheckout({ sessionId: data.sessionId });
			}
		});
		return false;
		$('.stripe-payment').attr('disabled','true');
		var amount = $('#wallet').val();
		if ($('#wallet').val() > 0) {
			var handler = StripeCheckout.configure({
		        key: "<?php echo $config['stripe_id'];?>",
		        locale: 'english',
		        image: '',
		        token: function(token) {
					Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG c_payment}}</div>'});
		          $.post(link('payment/stripe_payment'), {stripeToken:token.id,type:type,amount:amount}, function (data) {
		          	 if (data.status == 200) {
		          	 	window.location.href = data.url;
		          	 } else {
						$('.payment-modal').fadeOut(250);
						Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG payment_declined}}</div>'});
		          	 }
		          });
		        }
		    });

		    handler.open({
	           name: "<?php echo $config['site_name']?>",
	           description: "Wallet top up",
	           amount: amount+'00',
	           currency: '<?php echo $config["currency"]?>',
	           opened: function () {
	           	    $('.stripe-payment').removeAttr('disabled');
					$('.choose-payment').fadeOut(250);
	           }
	        });
		    $(window).on('popstate', function() {
		       handler.close();
		    });
        }else{
			Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG please_check_details}}</div>'});
		}
	}

				$('#authorize_alert').html("<div class='alert alert-danger'>"+data.error+"</div>");
