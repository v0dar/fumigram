	$final_step.slideUp();
	$detail_step.slideDown();
	$('.ad-step').removeClass('step-three-active');
	e.preventDefault();
});
$details.on("click", function(e){
	if (!$('#company').val()) {
		Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG please_check_details}}</div>'});
	} else {
		$media_step.slideUp();
	    $detail_step.slideDown();
	    $('.ad-step').addClass('step-two-active');
	}
});
$proceed.on("click", function(e){
	if (!$('#camp-title').val() || !$('#description').val() || !$('#camp-url').val()) {
		Snackbar.show({showAction: false,backgroundColor: '#fff',text: '<div class="snack-div">{{LANG kindly_fill_details}}</div>'});
	} else {
		$media_step.slideUp();
		$detail_step.slideUp();
		$final_step.slideDown();

	}
});

$(function () {
	var media_drop = $("[data-block='drop-zone']");
	if (typeof(window.FileReader)){
		media_drop[0].ondragover = function() {
		 $('.camp-media').addClass('active');
		 return false;
	}; media_drop[0].ondragleave = function() {
		 $('.camp-media').removeClass('active');
		 return false;
	}; media_drop[0].ondrop = function(event) {
		 event.preventDefault();
		 $('.camp-media').removeClass('active');
		 var file = event.dataTransfer.files;
		 $('#create_ad').find('input').prop('files', file);
		 $('#create_ad').find('input').trigger("change");
	  };
	}
});

$(document).ready(function() {
	$("#image").on('change', function() {
	var countFiles = $(this)[0].files.length;
	var mediaPath = $(this)[0].value;
	var extn = mediaPath.substring(mediaPath.lastIndexOf('.') + 1).toLowerCase();
	var media_holder = $("#media-holder");
	media_holder.empty();
	if (extn == "gif" || extn == "png" || extn == "jpg" || extn == "jpeg") {
		if (typeof(FileReader) != "undefined") {
		for (var i = 0; i < countFiles; i++) {
			var reader = new FileReader();
			reader.onload = function(e) {
				$("<img />", {
                    "src": e.target.result,
                    "class": "thumb"
                  }).appendTo(media_holder);
                }
                media_holder.show();
                reader.readAsDataURL($(this)[0].files[i]);
              }
            } else {
				media_holder.html("<p>This browser does not support FileReader.</p>");
            }
         }
	});
});
