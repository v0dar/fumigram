<script>
	tippy('.close', {arrow: true,content: '{{LANG dismiss}}'});
	tippy('.verified-color', {arrow: true,content: '{{LANG verified}}'});
	tippy('.c-comment', {arrow: true,content: '{{LANG comments}}'});
	tippy('.star-post', {arrow: true,content: '{{LANG star_post}}'});
	tippy('.share-post', {arrow: true,content: '{{LANG share}}'});
	tippy('.btn-post-comment-send', {arrow: true,content: '{{LANG submit}}'});
	$(document).on("click","[data-modal-dismiss]",function(event) {$("#report-post").fadeOut(200)});
	$('#tiles-cr').flickity({freeScroll: true,pageDots: false,contain: true,resize: true,cellAlign: 'left',autoPlay: false,friction: 0.2});
	$('.tl-follow-suggestions').flickity({freeScroll: true,pageDots: false,contain: true,resize: true,cellAlign: 'left',autoPlay: true,friction: 0.2});
	$(document).on("click","[modal-dismiss]",function(event) {$(this).closest('#unlock-post').fadeOut(300, function() {$(this).data('id', '')});});
	$(document).on("click","[modal-dismiss]",function(event) {$(this).closest('#subscribe-modal').fadeOut(300, function() {$(this).data('id', '')});});
	jQuery(document).ready(function() {jQuery('.fixed-element').theiaStickySidebar({additionalMarginTop: 92});});
	function ad_click(id) {
		$.post(link('profile/ad_click'), { id: id }, function (data, textStatus, xhr) { });
	}
	function show_m_reprted(post_id) {
		$('.show_m_reprted-' + post_id).hide('slow');
		$('.text_m_reprted-' + post_id).hide('slow');
	}
	jQuery(document).ready(function ($) {
		var scrolled = 0;
		var last_id = 0;
		var tag_id = "<?php echo $context['tag_id']; ?>";
		var posts_cn = $('.home-posts-container');
		$(window).scroll(function () {
			if ($(window).scrollTop() + $(window).height() > $(document).height() - 100) {
				if (scrolled == 0 && $('.home-posts-container').length > 0 && $('.home-posts-container').attr('data-posts') != 'no_posts') {
					scrolled = 1;
					posts_cn.siblings('.post__loading').removeClass('hidden');
					if ($('[data-post-id]').length > 0) {
						last_id = $('[data-post-id]').last().data('post-id');
					}
					$.ajax({
						url: link('posts/load-tag-posts'),
						type: 'GET',
						dataType: 'json',
						data: { offset: last_id, tag_id:tag_id },
					}).done(function (data) {
						if (data.status == 200) {
							posts_cn.append($(data.html));
							scrolled = 0;
							if (data.html == '') {
								setTimeout(function (){
									$('.home-posts-container').attr('data-posts', 'no_posts');
								}, 1500);	
							}
						} else { $(window).unbind('scroll'); }
						setTimeout(function (){
							posts_cn.siblings('.post__loading').addClass('hidden');
						}, 1500);	
					});
				}
			}
		});
	});
</script>
